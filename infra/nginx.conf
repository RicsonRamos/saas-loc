worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Rate Limiting Global
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream backend_api {
        server backend:8080;
    }

    upstream frontend_app {
        server frontend:80;
    }

    server {
        listen 80;
        server_name saaslocadora.com www.saaslocadora.com;

        # Redirecionamento HTTP para HTTPS (Descomentar após gerar Certbot na VPS)
        # return 301 https://$host$request_uri;

        # Servir Frontend
        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Servir Backend API
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Configuração HTTPS (Descomentar e configurar caminhos válidos após gerar certificados)
    # server {
    #     listen 443 ssl;
    #     server_name saaslocadora.com www.saaslocadora.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/saaslocadora.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/saaslocadora.com/privkey.pem;
    #
    #     location / {
    #         proxy_pass http://frontend_app;
    #     }
    #
    #     location /api/ {
    #         proxy_pass http://backend_api;
    #     }
    # }
}
