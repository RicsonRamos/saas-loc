name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          
      - name: Build and Test Backend
        working-directory: ./backend
        run: mvn clean verify

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    # Só tenta fazer o deploy se as chaves SSH estiverem configuradas nos Secrets do repositório
    if: "${{ secrets.VPS_HOST != '' && secrets.VPS_USERNAME != '' }}"
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /opt/saas-locadora
          git pull origin main
          
          # Copia variáveis de ambiente
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" > .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }}" >> .env
          
          # Rebuild and Deploy
          docker-compose -f docker-compose.prod.yml build
          docker-compose -f docker-compose.prod.yml up -d
          
          # Limpa imagens antigas não utilizadas
          docker image prune -f
